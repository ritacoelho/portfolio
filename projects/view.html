<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project — Rita Coelho</title>
  <link rel="icon" href="/favicon.ico">
  <meta name="theme-color" content="#251605">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script>(function(){var t=localStorage.getItem("rc_theme")||(window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);}());</script>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="project-page">

<header class="nav" id="nav" role="banner">
  <a href="../index.html" class="nav__logo" aria-label="Rita Coelho — home">RC<span>.</span></a>
  <nav aria-label="Main navigation">
    <ul class="nav__links" role="list">
      <li><a href="../work.html"    class="nav__link active">Work</a></li>
      <li><a href="../journey.html" class="nav__link">Journey</a></li>

    </ul>
  </nav>
  <button class="nav__menu-btn" id="menu-btn" aria-label="Open navigation" aria-expanded="false">

  <a href="../work.html"    class="mobile-menu__link active">Work</a>
  <a href="../journey.html" class="mobile-menu__link">Journey</a>

  <a href="../contact.html" class="mobile-menu__link">Contact</a>

<main id="project-main">
  <!-- Loading state -->
  <div id="project-loading" class="container" style="padding:6rem 0;text-align:center;color:var(--muted);font-size:0.9rem;">
    Loading…
  </div>
</main>

<footer class="footer" role="contentinfo">
  <p class="footer__copy">© 2024–2026 Rita Coelho</p>
  <p class="footer__easter">
    <span class="footer__diamond" aria-hidden="true"></span>
    Made with intention
  </p>
</footer>

<script src="../js/main.js" defer></script>
<script>
(function () {
  var SVG_BACK = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M12.5 8h-9M6.5 4L3 8l3.5 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  var SVG_EDIT = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M9.5 1.5l3 3-7 7H2.5v-3l7-7Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>';
  var SVG_PLUS = '<svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M9 3v12M3 9h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>';
  var SVG_SAVE = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M2 7h10M7 2l5 5-5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  // ── Get slug from URL ──────────────────────────────────────────
  var params = new URLSearchParams(window.location.search);
  var slug   = params.get('slug');

  if (!slug) {
    document.getElementById('project-loading').textContent = 'No project specified.';
    return;
  }

  // ── Escape HTML ────────────────────────────────────────────────
  function esc(str) {
    return String(str || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── State ──────────────────────────────────────────────────────
  var editMode       = false;
  var currentProject = null;

  // Expose for ctx-menu edit action
  window.__rcProjectEnterEdit = function () { enterEditMode(); };

  // ── Render a content block (view mode) ────────────────────────
  function renderBlock(block) {
    switch (block.type) {
      case 'heading': {
        var level = block.level || 2;
        return '<h' + level + '>' + esc(block.text) + '</h' + level + '>';
      }
      case 'paragraph':
        return '<p>' + esc(block.text) + '</p>';
      case 'image':
        return [
          '<figure style="margin:2rem 0;">',
            '<img src="' + esc(block.url) + '" alt="' + esc(block.alt || '') + '"',
                 ' style="width:100%;border-radius:12px;display:block;" loading="lazy">',
            block.caption
              ? '<figcaption style="font-size:0.78rem;color:var(--muted);margin-top:0.5rem;text-align:center;">' + esc(block.caption) + '</figcaption>'
              : '',
          '</figure>'
        ].join('');
      case 'callout':
        return '<div class="callout"><p>' + esc(block.text) + '</p></div>';
      case 'metrics': {
        var items = (block.items || []).map(function (item) {
          return '<div><p class="project-meta__label">' + esc(item.label) + '</p>' +
                 '<p class="project-meta__value">' + esc(item.value) + '</p></div>';
        }).join('');
        return '<div class="project-meta" style="margin:2rem 0;">' + items + '</div>';
      }
      case 'divider':
        return '<hr style="border:none;border-top:1px solid var(--border);margin:2.5rem 0;">';
      default:
        return '';
    }
  }

  // ── Render a content block (edit mode — contenteditable) ───────
  function renderBlockView(block, idx) {
    if (!editMode) { return renderBlock(block); }

    var isDivider  = block.type === 'divider';
    var extraClass = isDivider ? ' pv-block-wrap--divider' : '';
    var del        = '<button class="pv-block-del pv-block-btn" data-idx="' + idx + '" aria-label="Delete block" title="Delete">×</button>';
    var drag       = '<span class="pv-block-drag" aria-hidden="true" title="Drag to reorder">⠿</span>';

    var wrap = function (inner) {
      return '<div class="pv-block-wrap' + extraClass + '" data-block-idx="' + idx + '" draggable="true">' +
             drag + inner + del + '</div>';
    };

    switch (block.type) {
      case 'heading': {
        var level = block.level || 2;
        return wrap('<h' + level + ' contenteditable="true"' +
                    ' data-pv-block-idx="' + idx + '" data-pv-block-field="text"' +
                    ' class="pv-editable pv-block-editable">' + esc(block.text) + '</h' + level + '>');
      }
      case 'paragraph':
        return wrap('<p contenteditable="true"' +
                    ' data-pv-block-idx="' + idx + '" data-pv-block-field="text"' +
                    ' class="pv-editable pv-block-editable">' + esc(block.text) + '</p>');
      case 'callout':
        return wrap('<div class="callout"><p contenteditable="true"' +
                    ' data-pv-block-idx="' + idx + '" data-pv-block-field="text"' +
                    ' class="pv-editable pv-block-editable">' + esc(block.text) + '</p></div>');
      default:
        return wrap(renderBlock(block));
    }
  }

  // ── Render the full project ────────────────────────────────────
  function renderProject(p) {
    currentProject = JSON.parse(JSON.stringify(p));
    document.title = p.title + ' — Rita Coelho';

    var tags = (p.tags || []).map(function (t) {
      return '<span class="project-hero__tag">' + esc(t) + '</span>';
    }).join('');

    var metaItems = [];
    if (p.company)  { metaItems.push({ label: 'Company',  key: 'company',  value: p.company  }); }
    if (p.period)   { metaItems.push({ label: 'Period',   key: 'period',   value: p.period   }); }
    if (p.role)     { metaItems.push({ label: 'My role',  key: 'role',     value: p.role     }); }
    if (p.location) { metaItems.push({ label: 'Location', key: 'location', value: p.location }); }

    var metaHtml = metaItems.map(function (m) {
      var editAttr = editMode ? ' contenteditable="true" data-pv-field="' + m.key + '" class="pv-editable"' : '';
      return '<div><p class="project-meta__label">' + esc(m.label) + '</p>' +
             '<p class="project-meta__value"' + editAttr + '>' + esc(m.value) + '</p></div>';
    }).join('');

    var SVG_IMG = '<svg width="13" height="13" viewBox="0 0 14 14" fill="none" aria-hidden="true"><rect x="1" y="2" width="12" height="10" rx="2" stroke="currentColor" stroke-width="1.4"/><circle cx="4.5" cy="5.5" r="1" fill="currentColor"/><path d="M1 10l3-3 2 2 3-4 4 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    var isAdmin = !!sessionStorage.getItem('rc_admin_token');
    var coverHtml = p.coverImage
      ? '<div class="project-hero__cover pv-cover-wrap" style="margin:2rem 0 0;">' +
          '<img src="' + esc(p.coverImage) + '" alt="" id="pv-cover-img" style="width:100%;max-height:380px;object-fit:cover;object-position:center;border-radius:16px;display:block;" loading="lazy">' +
          (isAdmin
            ? '<button class="pv-cover-upload-btn" id="pv-cover-btn">' + SVG_IMG + ' Change cover</button>' +
              '<input type="file" id="pv-cover-file" accept="image/*" style="display:none">'
            : '') +
        '</div>'
      : (editMode
          ? '<div style="margin:1.5rem 0;">' +
              '<button class="pv-cover-upload-btn" id="pv-cover-btn" style="position:static;background:transparent;border:1.5px solid var(--border,#D0D7DD);color:var(--text,#333);box-shadow:none;">' + SVG_IMG + ' Add cover photo</button>' +
              '<input type="file" id="pv-cover-file" accept="image/*" style="display:none">' +
            '</div>'
          : '');

    var blocksHtml = (p.content || []).map(function (b, i) { return renderBlockView(b, i); }).join('');

    var titleEditAttr   = editMode ? ' contenteditable="true" data-pv-field="title"   class="pv-editable"' : '';
    var summaryEditAttr = editMode ? ' contenteditable="true" data-pv-field="summary" class="pv-editable"' : '';

    var html = [
      '<section class="project-hero section container" style="position:relative;">',
        '<a href="../work.html" class="project-hero__back fade-up" aria-label="Back to all work">',
          SVG_BACK + ' All Work',
        '</a>',
        '<div class="project-hero__tags fade-up fade-up--d1" id="pv-tags-row">' + tags + '</div>',
        '<h1 class="project-hero__title fade-up fade-up--d2"' + titleEditAttr + '>' + esc(p.title) + '</h1>',
        (p.summary || editMode)
          ? '<p class="project-hero__summary fade-up fade-up--d3"' + summaryEditAttr + '>' + esc(p.summary || '') + '</p>'
          : '',
        metaHtml ? '<div class="project-meta fade-up fade-up--d4">' + metaHtml + '</div>' : '',
        coverHtml,
      '</section>',
      '<section class="section container" aria-label="Case study">',
        '<div class="project-body" id="pv-body">',
          blocksHtml,
        '</div>',
      '</section>',
    ].join('');

    var main = document.getElementById('project-main');
    main.innerHTML = html;

    // Trigger fade-up animations
    setTimeout(function () {
      main.querySelectorAll('.fade-up').forEach(function (el) { el.classList.add('visible'); });
    }, 60);

    if (editMode) { wireEditMode(); }

    // Inject ctx trigger inside .project-hero (after HTML is in DOM)
    injectCtxTrigger(p);

    // Sync edit mode body class + FAB visibility
    document.body.classList.toggle('project-edit-mode', editMode);

    window.dispatchEvent(new CustomEvent('rc-project-rendered', { detail: p }));
  }

  // ── Inject ctx trigger inside .project-hero ───────────────────
  function injectCtxTrigger(project) {
    var existing = document.getElementById('rc-page-ctx-trigger');
    if (existing) { existing.remove(); }

    var hero = document.querySelector('.project-hero');
    if (!hero) { return; }

    var btn = document.createElement('button');
    btn.id        = 'rc-page-ctx-trigger';
    btn.className = 'rc-page-ctx-trigger ctx-trigger';
    btn.setAttribute('aria-label', 'Project actions');
    btn.dataset.ctxRoot = '1';

    var proxy = document.createElement('div');
    proxy.dataset.slug        = project.slug   || '';
    proxy.dataset.title       = project.title  || '';
    proxy.dataset.url         = window.location.href;
    proxy.dataset.ctxType     = 'project';
    proxy.dataset.adminHidden = project.isHidden ? '1' : '0';
    proxy.dataset.isLocked    = project.isLocked  ? '1' : '0';
    proxy.classList.add('project-card');
    btn._ctxProxyItem = proxy;

    hero.appendChild(btn);

    // Align button vertically with the tags row
    var tagsRow = document.getElementById('pv-tags-row');
    if (tagsRow) {
      btn.style.top = tagsRow.offsetTop + 'px';
    }
    setTimeout(function () { btn.classList.add('is-visible'); }, 200);

    if (!btn._ctxWired) {
      btn._ctxWired = true;
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        e.preventDefault();
        var ctxMenu = document.getElementById('ctx-menu');
        if (ctxMenu && ctxMenu.classList.contains('open') && window.__rcActiveCard === proxy) {
          if (typeof window.__rcCloseCtxMenu === 'function') { window.__rcCloseCtxMenu(); }
        } else {
          if (typeof window.__rcCloseCtxMenu === 'function') { window.__rcCloseCtxMenu(); }
          if (typeof window.__rcOpenCtxMenu  === 'function') { window.__rcOpenCtxMenu(btn, proxy); }
        }
      });
    }

    if (typeof window.__rcInitCtx === 'function') { window.__rcInitCtx(); }
  }

  // ── FABs — injected once, controlled via CSS body classes ─────
  var _fabsInjected = false;

  function injectFABs() {
    if (_fabsInjected) { return; }
    _fabsInjected = true;

    // Edit FAB (bottom-right, visible when not editing)
    var editFab = document.createElement('button');
    editFab.id        = 'pv-edit-fab';
    editFab.className = 'rc-project-edit-fab';
    editFab.innerHTML = SVG_EDIT + ' Edit page';
    document.body.appendChild(editFab);
    editFab.addEventListener('click', enterEditMode);

    // Save + Cancel bar (bottom-right, visible in edit mode)
    var saveBar = document.createElement('div');
    saveBar.id        = 'pv-save-bar';
    saveBar.className = 'rc-project-save-bar';
    saveBar.innerHTML =
      '<button class="rc-edit-cancel-btn" id="pv-cancel-btn">Cancel</button>' +
      '<button class="rc-edit-save-btn"   id="pv-save-btn">' + SVG_SAVE + ' Save changes</button>';
    document.body.appendChild(saveBar);
    document.getElementById('pv-cancel-btn').addEventListener('click', exitEditMode);
    document.getElementById('pv-save-btn').addEventListener('click', saveProject);

    // +Block FAB (bottom-center, visible in edit mode)
    var addWrap = document.createElement('div');
    addWrap.id        = 'pv-add-block-wrap';
    addWrap.className = 'rc-block-add-fab-wrap';
    addWrap.innerHTML =
      '<div class="rc-block-add-menu" id="pv-add-block-menu" aria-hidden="true"></div>' +
      '<button class="rc-block-add-fab" id="pv-add-block-fab" aria-label="Add block" aria-expanded="false">' + SVG_PLUS + '</button>';
    document.body.appendChild(addWrap);
    document.getElementById('pv-add-block-fab').addEventListener('click', toggleBlockMenu);
  }

  // Inject FABs once admin mode is active
  window.addEventListener('rc-admin-enabled', injectFABs);

  // ── Enter / exit edit mode ────────────────────────────────────
  function enterEditMode() {
    if (editMode || !currentProject) { return; }
    editMode = true;
    renderProject(currentProject);
  }

  function exitEditMode() {
    if (!editMode) { return; }
    editMode = false;
    closeBlockMenu();
    renderProject(currentProject);
  }

  // ── Save project ──────────────────────────────────────────────
  async function saveProject() {
    var token   = sessionStorage.getItem('rc_admin_token');
    var saveBtn = document.getElementById('pv-save-btn');
    if (saveBtn) { saveBtn.disabled = true; saveBtn.innerHTML = 'Saving…'; }
    try {
      var r = await fetch('/api/projects', {
        method:  'PATCH',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body:    JSON.stringify(Object.assign({}, currentProject, { slug: slug })),
      });
      var data = await r.json();
      if (r.ok) {
        showToast('Project saved');
        exitEditMode();
      } else {
        showToast(data.error || 'Save failed');
        if (saveBtn) { saveBtn.disabled = false; saveBtn.innerHTML = SVG_SAVE + ' Save changes'; }
      }
    } catch (e) {
      showToast('Network error');
      if (saveBtn) { saveBtn.disabled = false; saveBtn.innerHTML = SVG_SAVE + ' Save changes'; }
    }
  }

  // ── Toast ─────────────────────────────────────────────────────
  function showToast(msg) {
    var t = document.createElement('div');
    t.className = 'rc-toast'; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(function () { t.remove(); }, 2200);
  }

  // ── +Block menu ───────────────────────────────────────────────
  function toggleBlockMenu() {
    var fab  = document.getElementById('pv-add-block-fab');
    if (!fab) { return; }
    fab.getAttribute('aria-expanded') === 'true' ? closeBlockMenu() : openBlockMenu();
  }

  function openBlockMenu() {
    var fab  = document.getElementById('pv-add-block-fab');
    var menu = document.getElementById('pv-add-block-menu');
    if (!fab || !menu) { return; }

    var BLOCK_TYPES = [
      { type: 'heading',   label: 'Heading'   },
      { type: 'paragraph', label: 'Para'      },
      { type: 'callout',   label: 'Callout'   },
      { type: 'divider',   label: 'Divider'   },
      { type: 'image',     label: 'Image'     },
    ];

    // Semi-circle above the button: 5 items, angles 180°→360° (left → top → right)
    var ANGLES  = [180, 225, 270, 315, 360];
    var RADIUS  = 90; // px from center

    menu.innerHTML = '';
    BLOCK_TYPES.forEach(function (b, i) {
      var btn = document.createElement('button');
      btn.className  = 'rc-block-add-opt';
      btn.dataset.btype = b.type;
      btn.textContent   = b.label;

      // Radial position: CSS coordinates (positive Y = down, so sin gives negative for "up")
      var rad = ANGLES[i] * Math.PI / 180;
      var x   = Math.round(Math.cos(rad) * RADIUS); // negative = left
      var y   = Math.round(Math.sin(rad) * RADIUS); // negative = up
      btn.style.left = x + 'px';
      btn.style.top  = y + 'px';
      // Initial: centered + scaled down (animated in below)
      btn.style.transform = 'translate(-50%, -50%) scale(0)';
      btn.style.opacity   = '0';

      btn.addEventListener('click', function () {
        addBlock(b.type);
        closeBlockMenu();
      });
      menu.appendChild(btn);
    });

    // Show menu container
    menu.setAttribute('aria-hidden', 'false');
    menu.classList.add('open');
    fab.setAttribute('aria-expanded', 'true');
    fab.classList.add('active');

    // Animate options into their radial positions (staggered)
    var opts = menu.querySelectorAll('.rc-block-add-opt');
    opts.forEach(function (btn, i) {
      setTimeout(function () {
        btn.style.transform = 'translate(-50%, -50%) scale(1)';
        btn.style.opacity   = '1';
      }, i * 30);
    });
  }

  function closeBlockMenu() {
    var fab  = document.getElementById('pv-add-block-fab');
    var menu = document.getElementById('pv-add-block-menu');
    if (fab)  { fab.setAttribute('aria-expanded', 'false'); fab.classList.remove('active'); }
    if (menu) {
      // Animate back before clearing
      menu.querySelectorAll('.rc-block-add-opt').forEach(function (btn) {
        btn.style.transform = 'translate(-50%, -50%) scale(0)';
        btn.style.opacity   = '0';
      });
      setTimeout(function () {
        menu.setAttribute('aria-hidden', 'true');
        menu.classList.remove('open');
        menu.innerHTML = '';
      }, 180);
    }
  }

  function addBlock(type) {
    var newBlock = { type: type };
    if (type === 'heading')   { newBlock.level = 2; newBlock.text = 'New heading'; }
    if (type === 'paragraph') { newBlock.text = 'New paragraph.'; }
    if (type === 'callout')   { newBlock.text = 'Key insight.'; }
    if (type === 'image')     { newBlock.url = ''; newBlock.alt = ''; }
    currentProject.content.push(newBlock);
    renderProject(currentProject);
    // Scroll new block into view
    setTimeout(function () {
      var body = document.getElementById('pv-body');
      if (body) {
        var wraps = body.querySelectorAll('.pv-block-wrap');
        var last  = wraps[wraps.length - 1];
        if (last) { last.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
      }
    }, 80);
  }

  // ── Wire edit mode interactions ───────────────────────────────
  function wireEditMode() {
    var token = sessionStorage.getItem('rc_admin_token');

    // Sync hero/meta field edits (title, summary, company, period…)
    document.querySelectorAll('[data-pv-field]').forEach(function (el) {
      el.addEventListener('input', function () {
        currentProject[el.dataset.pvField] = el.innerText.trim();
      });
    });

    // Sync inline block edits + Cmd+Shift+U link insertion
    document.querySelectorAll('[data-pv-block-idx]').forEach(function (el) {
      el.addEventListener('input', function () {
        var idx   = parseInt(el.dataset.pvBlockIdx, 10);
        var field = el.dataset.pvBlockField;
        if (currentProject.content[idx] !== undefined) {
          currentProject.content[idx][field] = el.innerText.trim();
        }
      });
      el.addEventListener('keydown', function (e) {
        // Prevent Enter from inserting <div>/<br>
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); }
        // Cmd/Ctrl+Shift+U → insert link
        if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.code === 'KeyU') {
          e.preventDefault();
          insertLink(el);
        }
      });
    });

    // Block delete
    document.querySelectorAll('.pv-block-del').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var idx = parseInt(btn.dataset.idx, 10);
        currentProject.content.splice(idx, 1);
        renderProject(currentProject);
      });
    });

    // Drag-to-reorder
    wireDragReorder();

    // ── Cover image: crop modal flow ──────────────────────────────
    var coverBtn  = document.getElementById('pv-cover-btn');
    var coverFile = document.getElementById('pv-cover-file');

    // Convert a data-URL to a Blob for uploading
    function dataUrlToBlob(dataUrl) {
      var parts = dataUrl.split(',');
      var mime  = (parts[0].match(/:(.*?);/) || [])[1] || 'image/jpeg';
      var bytes = atob(parts[1]);
      var arr   = new Uint8Array(bytes.length);
      for (var i = 0; i < bytes.length; i++) { arr[i] = bytes.charCodeAt(i); }
      return new Blob([arr], { type: mime });
    }

    // Upload a cropped data-URL blob and update the cover
    async function uploadCroppedCover(dataUrl, label) {
      if (coverBtn) { coverBtn.disabled = true; }
      showToast('Uploading cover…');
      try {
        var blob = dataUrlToBlob(dataUrl);
        var r    = await fetch('/api/upload?filename=cover.jpg', {
          method: 'POST', headers: { 'Authorization': 'Bearer ' + token }, body: blob,
        });
        var data = await r.json();
        if (data.url) {
          currentProject.coverImage = data.url;
          var img = document.getElementById('pv-cover-img');
          if (img) { img.src = data.url; } else { renderProject(currentProject); return; }
          if (coverBtn) { coverBtn.disabled = false; }
          showToast('Cover updated');
        } else {
          if (coverBtn) { coverBtn.disabled = false; }
          showToast(data.error || 'Upload failed');
        }
      } catch (e) {
        if (coverBtn) { coverBtn.disabled = false; }
        showToast('Upload error');
      }
    }

    // Show landscape crop modal (16:9).
    // onConfirm(dataUrl) — user applied crop.
    // onUploadNew() — user clicked "Upload different image".
    function showCoverCropModal(srcUrl, onConfirm, onUploadNew) {
      var SVG_CLOSE = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>';
      var overlay = document.createElement('div');
      overlay.className = 'rc-crop-overlay';
      overlay.innerHTML = [
        '<div class="rc-crop-card">',
          '<button class="rc-modal-close" id="rcc-close" aria-label="Close">' + SVG_CLOSE + '</button>',
          '<h2 class="rc-modal-title" style="margin-bottom:0.25rem;">Crop cover image</h2>',
          '<p class="rc-crop-hint">Drag to reposition · scroll or pinch to zoom</p>',
          '<div class="rc-crop-viewport rc-crop-viewport--landscape" id="rcc-vp">',
            '<img class="rc-crop-img" id="rcc-img" src="' + srcUrl + '" crossorigin="anonymous" draggable="false" alt="">',
            '<div class="rc-crop-grid"></div>',
          '</div>',
          '<div class="rc-crop-controls">',
            '<button class="rc-crop-zoom-btn" id="rcc-zout" aria-label="Zoom out">−</button>',
            '<span class="rc-crop-zoom-label">Zoom</span>',
            '<button class="rc-crop-zoom-btn" id="rcc-zin"  aria-label="Zoom in">+</button>',
          '</div>',
          '<div class="rc-crop-actions">',
            '<button class="ac-btn ac-btn--primary" id="rcc-confirm">Apply crop</button>',
            '<button class="ac-btn ac-btn--ghost"   id="rcc-upload-new">Upload different image</button>',
            '<button class="ac-btn ac-btn--ghost"   id="rcc-cancel">Cancel</button>',
          '</div>',
        '</div>'
      ].join('');
      document.body.appendChild(overlay);

      var vp  = document.getElementById('rcc-vp');
      var img = document.getElementById('rcc-img');
      var s   = { scale: 1, minScale: 1, maxScale: 8, ox: 0, oy: 0, nw: 0, nh: 0 };

      function clamp() {
        var iw = s.nw * s.scale, ih = s.nh * s.scale;
        var vw = vp.offsetWidth,  vh = vp.offsetHeight;
        s.ox = Math.min(0, Math.max(s.ox, vw - iw));
        s.oy = Math.min(0, Math.max(s.oy, vh - ih));
      }
      function draw() {
        clamp();
        img.style.transform = 'translate(' + s.ox + 'px,' + s.oy + 'px) scale(' + s.scale + ')';
      }
      function zoomToward(factor, px, py) {
        var ns = Math.max(s.minScale, Math.min(s.maxScale, s.scale * factor));
        s.ox = px - (px - s.ox) * (ns / s.scale);
        s.oy = py - (py - s.oy) * (ns / s.scale);
        s.scale = ns; draw();
      }
      function init() {
        s.nw = img.naturalWidth; s.nh = img.naturalHeight;
        var vw = vp.offsetWidth, vh = vp.offsetHeight;
        s.minScale = Math.max(vw / s.nw, vh / s.nh);
        s.maxScale = s.minScale * 8;
        s.scale    = s.minScale;
        s.ox = (vw - s.nw * s.scale) / 2;
        s.oy = (vh - s.nh * s.scale) / 2;
        draw();
      }
      if (img.complete && img.naturalWidth) { init(); }
      else { img.addEventListener('load', init); }

      var drag = null;
      vp.addEventListener('mousedown', function (e) {
        e.preventDefault(); drag = { x: e.clientX, y: e.clientY, ox: s.ox, oy: s.oy };
        vp.classList.add('is-dragging');
      });
      document.addEventListener('mousemove', function mv(e) {
        if (!drag) { return; }
        s.ox = drag.ox + (e.clientX - drag.x); s.oy = drag.oy + (e.clientY - drag.y); draw();
      });
      document.addEventListener('mouseup', function () { drag = null; vp.classList.remove('is-dragging'); });

      vp.addEventListener('wheel', function (e) {
        e.preventDefault();
        var r = vp.getBoundingClientRect();
        zoomToward(e.deltaY < 0 ? 1.1 : 0.9, e.clientX - r.left, e.clientY - r.top);
      }, { passive: false });

      var prevDist = null, tDrag = null;
      vp.addEventListener('touchstart', function (e) {
        e.preventDefault();
        if (e.touches.length === 1) {
          tDrag = { x: e.touches[0].clientX, y: e.touches[0].clientY, ox: s.ox, oy: s.oy }; prevDist = null;
        } else {
          var t1 = e.touches[0], t2 = e.touches[1];
          prevDist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
        }
      }, { passive: false });
      vp.addEventListener('touchmove', function (e) {
        e.preventDefault();
        var r = vp.getBoundingClientRect();
        if (e.touches.length === 1 && prevDist === null && tDrag) {
          s.ox = tDrag.ox + (e.touches[0].clientX - tDrag.x);
          s.oy = tDrag.oy + (e.touches[0].clientY - tDrag.y); draw();
        } else if (e.touches.length >= 2) {
          var t1 = e.touches[0], t2 = e.touches[1];
          var dist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
          var mid  = { x: (t1.clientX + t2.clientX) / 2 - r.left, y: (t1.clientY + t2.clientY) / 2 - r.top };
          if (prevDist) { zoomToward(dist / prevDist, mid.x, mid.y); }
          prevDist = dist;
        }
      }, { passive: false });
      vp.addEventListener('touchend', function (e) {
        if (e.touches.length < 2) { prevDist = null; }
        if (e.touches.length === 1) { tDrag = { x: e.touches[0].clientX, y: e.touches[0].clientY, ox: s.ox, oy: s.oy }; }
      }, { passive: false });

      document.getElementById('rcc-zin').addEventListener('click', function () { zoomToward(1.25, vp.offsetWidth / 2, vp.offsetHeight / 2); });
      document.getElementById('rcc-zout').addEventListener('click', function () { zoomToward(1 / 1.25, vp.offsetWidth / 2, vp.offsetHeight / 2); });

      function dismiss() { overlay.remove(); }
      document.getElementById('rcc-close').addEventListener('click', dismiss);
      document.getElementById('rcc-cancel').addEventListener('click', dismiss);
      overlay.addEventListener('click', function (e) { if (e.target === overlay) { dismiss(); } });

      document.getElementById('rcc-upload-new').addEventListener('click', function () {
        dismiss();
        if (typeof onUploadNew === 'function') { onUploadNew(); }
      });

      document.getElementById('rcc-confirm').addEventListener('click', function () {
        var OUT_W = 1200, OUT_H = 675;  // 16:9
        var canvas = document.createElement('canvas');
        canvas.width = OUT_W; canvas.height = OUT_H;
        var ctx = canvas.getContext('2d');
        var vw = vp.offsetWidth, vh = vp.offsetHeight;
        var srcX = -s.ox / s.scale, srcY = -s.oy / s.scale;
        var srcW =  vw   / s.scale, srcH =  vh   / s.scale;
        try {
          ctx.drawImage(img, srcX, srcY, srcW, srcH, 0, 0, OUT_W, OUT_H);
          dismiss();
          onConfirm(canvas.toDataURL('image/jpeg', 0.9));
        } catch (e) {
          // Canvas tainted (CORS) — fall back to uploading a new file
          dismiss();
          showToast('Re-crop unavailable for this image — please upload a new version.');
          if (typeof onUploadNew === 'function') { onUploadNew(); }
        }
      });
    }

    // Open file picker → compress → crop modal → upload
    function openFilePicker() {
      if (coverFile) { coverFile.value = ''; coverFile.click(); }
    }

    // Compress image client-side (max 1920×1080, 85% JPEG)
    function compressCoverImage(file, callback) {
      var objUrl = URL.createObjectURL(file);
      var im = new Image();
      im.onerror = function () { URL.revokeObjectURL(objUrl); callback(null); };
      im.onload  = function () {
        var maxW = 1920, maxH = 1080;
        var w = im.width, h = im.height;
        var scale  = Math.min(1, maxW / w, maxH / h);
        var canvas = document.createElement('canvas');
        canvas.width  = Math.round(w * scale);
        canvas.height = Math.round(h * scale);
        canvas.getContext('2d').drawImage(im, 0, 0, canvas.width, canvas.height);
        URL.revokeObjectURL(objUrl);
        callback(canvas.toDataURL('image/jpeg', 0.85));
      };
      im.src = objUrl;
    }

    if (coverBtn) {
      // "Change cover" — open crop modal on existing image, or file picker if no cover
      coverBtn.addEventListener('click', function () {
        var existing = currentProject.coverImage;
        if (existing) {
          // Open crop modal with current image; user can re-crop or upload new
          showCoverCropModal(
            existing,
            function (croppedDataUrl) { uploadCroppedCover(croppedDataUrl); },
            openFilePicker
          );
        } else {
          openFilePicker();
        }
      });
    }

    if (coverFile) {
      coverFile.addEventListener('change', function () {
        var file = coverFile.files[0]; if (!file) { return; }
        compressCoverImage(file, function (dataUrl) {
          if (!dataUrl) { showToast('Could not read image'); return; }
          showCoverCropModal(
            dataUrl,
            function (croppedDataUrl) { uploadCroppedCover(croppedDataUrl); },
            openFilePicker
          );
        });
      });
    }
  }

  // ── Drag-to-reorder blocks ────────────────────────────────────
  function wireDragReorder() {
    var body = document.getElementById('pv-body');
    if (!body) { return; }
    var dragSrcIdx = null;

    body.querySelectorAll('.pv-block-wrap').forEach(function (wrap) {
      wrap.addEventListener('dragstart', function (e) {
        dragSrcIdx = parseInt(wrap.dataset.blockIdx, 10);
        wrap.classList.add('drag-dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', String(dragSrcIdx));
      });
      wrap.addEventListener('dragend', function () {
        wrap.classList.remove('drag-dragging');
        body.querySelectorAll('.pv-block-wrap').forEach(function (w) {
          w.classList.remove('drag-over');
        });
      });
      wrap.addEventListener('dragover', function (e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        body.querySelectorAll('.pv-block-wrap').forEach(function (w) { w.classList.remove('drag-over'); });
        wrap.classList.add('drag-over');
      });
      wrap.addEventListener('drop', function (e) {
        e.preventDefault();
        var targetIdx = parseInt(wrap.dataset.blockIdx, 10);
        if (dragSrcIdx === null || dragSrcIdx === targetIdx) { dragSrcIdx = null; return; }
        var moved = currentProject.content.splice(dragSrcIdx, 1)[0];
        currentProject.content.splice(targetIdx, 0, moved);
        dragSrcIdx = null;
        renderProject(currentProject);
      });
    });
  }

  // ── Cmd+Shift+U — insert link ─────────────────────────────────
  function insertLink(el) {
    var sel = window.getSelection();
    if (!sel || sel.rangeCount === 0) { return; }

    var range       = sel.getRangeAt(0);
    var savedRange  = range.cloneRange();
    var rect        = range.getBoundingClientRect();

    var prompt = document.createElement('div');
    prompt.className = 'pv-link-prompt';
    prompt.style.cssText =
      'position:fixed;top:' + (rect.bottom + 8) + 'px;left:' + Math.max(8, rect.left) + 'px;' +
      'z-index:9999;display:flex;gap:0.4rem;align-items:center;' +
      'background:#fff;border:1.5px solid var(--border,#ddd);' +
      'border-radius:10px;padding:0.4rem 0.6rem;' +
      'box-shadow:0 4px 24px rgba(0,0,0,0.13);font-family:var(--font-sans,sans-serif);';
    prompt.innerHTML =
      '<input class="pv-link-input pm-input" type="url" placeholder="https://…"' +
        ' style="flex:1;min-width:180px;font-size:0.8rem;border:1.5px solid var(--border,#ddd);border-radius:6px;padding:0.3rem 0.55rem;">' +
      '<button class="ac-btn ac-btn--primary" style="font-size:0.75rem;padding:0.3rem 0.7rem;" id="pv-link-ok">Insert</button>' +
      '<button class="ac-btn ac-btn--ghost"   style="font-size:0.75rem;padding:0.3rem 0.5rem;" id="pv-link-x">×</button>';
    document.body.appendChild(prompt);

    var input = prompt.querySelector('.pv-link-input');
    setTimeout(function () { input.focus(); }, 30);

    function doInsert() {
      var url = input.value.trim();
      if (!url) { prompt.remove(); return; }
      if (!/^https?:\/\//i.test(url)) { url = 'https://' + url; }
      sel.removeAllRanges();
      sel.addRange(savedRange);
      document.execCommand('createLink', false, url);
      // Update model
      var idx   = parseInt(el.dataset.pvBlockIdx, 10);
      var field = el.dataset.pvBlockField;
      if (currentProject.content[idx] !== undefined) {
        currentProject.content[idx][field] = el.innerText.trim();
      }
      prompt.remove();
    }

    document.getElementById('pv-link-ok').addEventListener('click', doInsert);
    document.getElementById('pv-link-x').addEventListener('click', function () { prompt.remove(); });
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter')  { e.preventDefault(); doInsert(); }
      if (e.key === 'Escape') { prompt.remove(); }
    });
  }

  // ── Load from API ──────────────────────────────────────────────
  var token   = sessionStorage.getItem('rc_admin_token');
  var headers = token ? { 'Authorization': 'Bearer ' + token } : {};

  fetch('/api/projects?slug=' + encodeURIComponent(slug), { headers: headers })
    .then(function (r) {
      if (r.status === 404) { throw new Error('not found'); }
      return r.json();
    })
    .then(function (project) {
      var loadingEl = document.getElementById('project-loading');
      if (loadingEl) { loadingEl.remove(); }
      renderProject(project);
      // Auto-enter edit mode when navigated via "Edit" ctx action (?edit=1)
      if (params.get('edit') === '1' && sessionStorage.getItem('rc_admin_token')) {
        // Small delay: wait for rc-admin-enabled to fire and FABs to be injected
        setTimeout(function () { enterEditMode(); }, 150);
      }
    })
    .catch(function () {
      var loadingEl = document.getElementById('project-loading');
      if (loadingEl) {
        loadingEl.innerHTML = '<p>Project not found. <a href="../work.html">Back to work</a></p>';
      }
    });

})();
</script>

  // rc-project-edit-start fired by admin.js ctx-menu Edit action
  window.addEventListener('rc-project-edit-start', function () {
    if (typeof window.__rcProjectEnterEdit === 'function') {
      window.__rcProjectEnterEdit();
    }

})();
