<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project — Rita Coelho</title>
  <link rel="icon" href="/favicon.ico">
  <meta name="theme-color" content="#251605">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="project-page">

<header class="nav" id="nav" role="banner">
  <a href="../index.html" class="nav__logo" aria-label="Rita Coelho — home">RC<span>.</span></a>
  <nav aria-label="Main navigation">
    <ul class="nav__links" role="list">
      <li><a href="../work.html"    class="nav__link active">Work</a></li>
      <li><a href="../journey.html" class="nav__link">Journey</a></li>
      <li><a href="../about.html"   class="nav__link">About</a></li>
      <li><a href="../contact.html" class="nav__link">Contact</a></li>
    </ul>
  </nav>
  <button class="nav__menu-btn" id="menu-btn" aria-label="Open navigation" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
</header>

<div class="mobile-menu" id="mobile-menu" role="dialog" aria-label="Navigation" aria-modal="true">
  <a href="../work.html"    class="mobile-menu__link active">Work</a>
  <a href="../journey.html" class="mobile-menu__link">Journey</a>
  <a href="../about.html"   class="mobile-menu__link">About</a>
  <a href="../contact.html" class="mobile-menu__link">Contact</a>
</div>

<main id="project-main">
  <!-- Loading state -->
  <div id="project-loading" class="container" style="padding:6rem 0;text-align:center;color:var(--muted);font-size:0.9rem;">
    Loading…
  </div>
</main>

<footer class="footer" role="contentinfo">
  <p class="footer__copy">© 2024–2026 Rita Coelho</p>
  <p class="footer__easter">
    <span class="footer__diamond" aria-hidden="true"></span>
    Made with intention
  </p>
</footer>

<script src="../js/main.js" defer></script>
<script>
(function () {
  var SVG_BACK = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M12.5 8h-9M6.5 4L3 8l3.5 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  // ── Get slug from URL ──────────────────────────────────────────
  var params = new URLSearchParams(window.location.search);
  var slug   = params.get('slug');

  if (!slug) {
    document.getElementById('project-loading').textContent = 'No project specified.';
    return;
  }

  // ── Escape HTML ────────────────────────────────────────────────
  function esc(str) {
    return String(str || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Render a content block ─────────────────────────────────────
  function renderBlock(block) {
    switch (block.type) {
      case 'heading':
        var level = block.level || 2;
        return '<h' + level + '>' + esc(block.text) + '</h' + level + '>';
      case 'paragraph':
        return '<p>' + esc(block.text) + '</p>';
      case 'image':
        return [
          '<figure style="margin:2rem 0;">',
            '<img src="' + esc(block.url) + '" alt="' + esc(block.alt || '') + '"',
                 ' style="width:100%;border-radius:12px;display:block;" loading="lazy">',
            block.caption
              ? '<figcaption style="font-size:0.78rem;color:var(--muted);margin-top:0.5rem;text-align:center;">' + esc(block.caption) + '</figcaption>'
              : '',
          '</figure>'
        ].join('');
      case 'callout':
        return '<div class="callout"><p>' + esc(block.text) + '</p></div>';
      case 'metrics':
        var items = (block.items || []).map(function (item) {
          return '<div><p class="project-meta__label">' + esc(item.label) + '</p>' +
                 '<p class="project-meta__value">' + esc(item.value) + '</p></div>';
        }).join('');
        return '<div class="project-meta" style="margin:2rem 0;">' + items + '</div>';
      case 'divider':
        return '<hr style="border:none;border-top:1px solid var(--border);margin:2.5rem 0;">';
      default:
        return '';
    }
  }

  // ── Check edit mode ────────────────────────────────────────────
  var editMode = params.get('edit') === '1' && !!sessionStorage.getItem('rc_admin_token');

  // ── Render a content block (view mode) ─────────────────────────
  function renderBlockView(block, idx) {
    var base = renderBlock(block);
    if (!editMode) { return base; }
    // Wrap each block with an edit overlay in edit mode
    return '<div class="pv-block-wrap" data-block-idx="' + idx + '" style="position:relative;">' +
           base +
           '<div class="pv-block-controls">' +
             '<button class="pv-block-btn pv-block-edit"  data-idx="' + idx + '">Edit</button>' +
             '<button class="pv-block-btn pv-block-del"   data-idx="' + idx + '">×</button>' +
           '</div>' +
           '</div>';
  }

  // ── Render the full project ────────────────────────────────────
  var currentProject = null;

  function renderProject(p) {
    currentProject = JSON.parse(JSON.stringify(p)); // deep copy
    document.title = p.title + ' — Rita Coelho';

    var tags = (p.tags || []).map(function (t) {
      return '<span class="project-hero__tag">' + esc(t) + '</span>';
    }).join('');

    var metaItems = [];
    if (p.company)  { metaItems.push({ label: 'Company',  key: 'company',  value: p.company  }); }
    if (p.period)   { metaItems.push({ label: 'Period',   key: 'period',   value: p.period   }); }
    if (p.role)     { metaItems.push({ label: 'My role',  key: 'role',     value: p.role     }); }
    if (p.location) { metaItems.push({ label: 'Location', key: 'location', value: p.location }); }

    var metaHtml = metaItems.map(function (m) {
      var editAttr = editMode ? ' contenteditable="true" data-pv-field="' + m.key + '" class="pv-editable"' : '';
      return '<div><p class="project-meta__label">' + esc(m.label) + '</p>' +
             '<p class="project-meta__value"' + editAttr + '>' + esc(m.value) + '</p></div>';
    }).join('');

    var coverHtml = p.coverImage
      ? '<div class="project-hero__cover" style="margin:2rem 0 0;position:relative;">' +
          '<img src="' + esc(p.coverImage) + '" alt="" id="pv-cover-img" style="width:100%;border-radius:16px;display:block;" loading="lazy">' +
          (editMode ? '<button class="pv-cover-upload-btn" id="pv-cover-btn">Change cover</button><input type="file" id="pv-cover-file" accept="image/*" style="display:none">' : '') +
        '</div>'
      : (editMode ? '<div style="margin:1rem 0;"><button class="pv-cover-upload-btn" id="pv-cover-btn">+ Add cover image</button><input type="file" id="pv-cover-file" accept="image/*" style="display:none"></div>' : '');

    var blocksHtml = (p.content || []).map(function (b, i) { return renderBlockView(b, i); }).join('');

    var titleEditAttr   = editMode ? ' contenteditable="true" data-pv-field="title"   class="pv-editable"' : '';
    var summaryEditAttr = editMode ? ' contenteditable="true" data-pv-field="summary" class="pv-editable"' : '';

    var adminBar = editMode
      ? '<div class="rc-view-admin-bar" style="display:flex;">' +
          '<span style="opacity:0.7;flex:1;">Editing <strong>' + esc(p.title) + '</strong></span>' +
          '<button class="ac-btn ac-btn--primary" id="pv-save-btn" style="font-size:0.78rem;">Save changes</button>' +
          '<button class="ac-btn ac-btn--ghost"   id="pv-add-block-btn" style="font-size:0.78rem;">+ Block</button>' +
          (p.isHidden
            ? '<button class="ac-btn ac-btn--ghost" id="pv-toggle-hide" style="font-size:0.78rem;">Show project</button>'
            : '<button class="ac-btn ac-btn--ghost" id="pv-toggle-hide" style="font-size:0.78rem;">Hide project</button>') +
          '<button class="ac-btn ac-btn--danger" id="pv-delete-btn" style="font-size:0.78rem;">Delete</button>' +
          '<span id="pv-save-status" style="font-size:0.78rem;color:var(--muted,#888);"></span>' +
        '</div>'
      : '<div class="admin-only" style="margin-bottom:1rem;display:flex;gap:0.5rem;">' +
          '<a href="?slug=' + esc(slug) + '&edit=1" class="btn btn--light" style="font-size:0.78rem;">Edit project</a>' +
        '</div>';

    var html = [
      '<section class="project-hero section container">',
        '<a href="../work.html" class="project-hero__back fade-up" aria-label="Back to all work">',
          SVG_BACK + ' All Work',
        '</a>',
        adminBar,
        '<div class="project-hero__tags fade-up fade-up--d1">' + tags + '</div>',
        '<h1 class="project-hero__title fade-up fade-up--d2"' + titleEditAttr + '>' + esc(p.title) + '</h1>',
        p.summary || editMode
          ? '<p class="project-hero__summary fade-up fade-up--d3"' + summaryEditAttr + '>' + esc(p.summary || '') + '</p>'
          : '',
        metaHtml ? '<div class="project-meta fade-up fade-up--d4">' + metaHtml + '</div>' : '',
        coverHtml,
      '</section>',
      '<section class="section container" aria-label="Case study">',
        '<div class="project-body" id="pv-body">',
          blocksHtml,
        '</div>',
        editMode ? '<div id="pv-add-block-panel" style="margin-top:1.5rem;display:none;"></div>' : '',
      '</section>',
    ].join('');

    var main = document.getElementById('project-main');
    main.innerHTML = html;

    // Trigger fade-up animations
    setTimeout(function () {
      main.querySelectorAll('.fade-up').forEach(function (el) { el.classList.add('visible'); });
    }, 60);

    if (editMode) { wireEditMode(p); }
  }

  // ── Edit mode wiring ───────────────────────────────────────────
  function wireEditMode(p) {
    var token = sessionStorage.getItem('rc_admin_token');
    function authHeaders() { return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }; }
    function showToast(msg) {
      var t = document.createElement('div'); t.className = 'rc-toast'; t.textContent = msg;
      document.body.appendChild(t); setTimeout(function(){t.remove();}, 2200);
    }

    // Sync inline editable fields back to currentProject
    document.querySelectorAll('[data-pv-field]').forEach(function (el) {
      el.addEventListener('input', function () {
        currentProject[el.dataset.pvField] = el.innerText.trim();
      });
    });

    // Block delete
    document.querySelectorAll('.pv-block-del').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var idx = parseInt(btn.dataset.idx, 10);
        currentProject.content.splice(idx, 1);
        renderProject(currentProject);
      });
    });

    // Block edit (simple textarea prompt for text blocks)
    document.querySelectorAll('.pv-block-edit').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var idx   = parseInt(btn.dataset.idx, 10);
        var block = currentProject.content[idx];
        if (!block) { return; }
        var newText = prompt('Edit block text:', block.text || JSON.stringify(block));
        if (newText !== null) {
          if (block.text !== undefined)       { currentProject.content[idx].text = newText; }
          else if (block.url !== undefined)   { currentProject.content[idx].url = newText; }
          renderProject(currentProject);
        }
      });
    });

    // Add block panel toggle
    var addBlockBtn = document.getElementById('pv-add-block-btn');
    var addBlockPanel = document.getElementById('pv-add-block-panel');
    if (addBlockBtn && addBlockPanel) {
      addBlockBtn.addEventListener('click', function () {
        addBlockPanel.style.display = addBlockPanel.style.display === 'none' ? '' : 'none';
        if (addBlockPanel.style.display !== 'none') {
          addBlockPanel.innerHTML = [
            '<div style="display:flex;flex-wrap:wrap;gap:0.5rem;">',
              ['heading','paragraph','image','callout','divider'].map(function(t){
                return '<button class="pm-add-block-btn pv-add-block-type" data-btype="'+t+'" style="border:1.5px dashed var(--border,#ddd);border-radius:7px;padding:0.35rem 0.8rem;background:transparent;font-size:0.72rem;cursor:pointer;font-family:inherit;color:var(--muted,#888);">+ '+t.charAt(0).toUpperCase()+t.slice(1)+'</button>';
              }).join(''),
            '</div>',
          ].join('');
          addBlockPanel.querySelectorAll('.pv-add-block-type').forEach(function (b) {
            b.addEventListener('click', function () {
              var type = b.dataset.btype;
              var newBlock = { type: type };
              if (type === 'heading')   { newBlock.level = 2; newBlock.text = 'New heading'; }
              if (type === 'paragraph') { newBlock.text = 'New paragraph text.'; }
              if (type === 'image')     { newBlock.url = ''; newBlock.alt = ''; }
              if (type === 'callout')   { newBlock.text = 'Callout text.'; }
              if (type === 'divider')   {} // no fields
              currentProject.content.push(newBlock);
              renderProject(currentProject);
            });
          });
        }
      });
    }

    // Cover image upload
    var coverBtn  = document.getElementById('pv-cover-btn');
    var coverFile = document.getElementById('pv-cover-file');
    if (coverBtn && coverFile) {
      coverBtn.addEventListener('click', function () { coverFile.click(); });
      coverFile.addEventListener('change', async function () {
        var file = coverFile.files[0]; if (!file) { return; }
        coverBtn.textContent = 'Uploading…';
        try {
          var r    = await fetch('/api/upload?filename=' + encodeURIComponent(file.name), {
            method: 'POST', headers: { 'Authorization': 'Bearer ' + token }, body: file,
          });
          var data = await r.json();
          if (data.url) {
            currentProject.coverImage = data.url;
            var img = document.getElementById('pv-cover-img');
            if (img) { img.src = data.url; }
            coverBtn.textContent = 'Change cover';
          } else { coverBtn.textContent = 'Upload failed'; }
        } catch (e) { coverBtn.textContent = 'Error'; }
      });
    }

    // Hide/Show toggle
    var toggleHideBtn = document.getElementById('pv-toggle-hide');
    if (toggleHideBtn) {
      toggleHideBtn.addEventListener('click', async function () {
        currentProject.isHidden = !currentProject.isHidden;
        await fetch('/api/projects', {
          method: 'PATCH', headers: authHeaders(),
          body: JSON.stringify({ slug: slug, isHidden: currentProject.isHidden }),
        });
        this.textContent = currentProject.isHidden ? 'Show project' : 'Hide project';
        showToast(currentProject.isHidden ? 'Project hidden' : 'Project now visible');
      });
    }

    // Delete
    var deleteBtn = document.getElementById('pv-delete-btn');
    if (deleteBtn) {
      deleteBtn.addEventListener('click', function () {
        if (typeof window.__rcShowConfirm === 'function') {
          window.__rcShowConfirm(
            'Deleting <strong>"' + (currentProject.title || slug) + '"</strong> is permanent and cannot be undone.',
            async function () {
              var r = await fetch('/api/projects', {
                method: 'DELETE', headers: authHeaders(), body: JSON.stringify({ slug: slug }),
              });
              if (r.ok) { window.location.href = '../work.html'; }
              else { showToast('Could not delete project'); }
            }
          );
        }
      });
    }

    // Save changes
    var saveBtn    = document.getElementById('pv-save-btn');
    var saveStatus = document.getElementById('pv-save-status');
    if (saveBtn) {
      saveBtn.addEventListener('click', async function () {
        saveBtn.disabled = true;
        if (saveStatus) { saveStatus.textContent = 'Saving…'; }
        try {
          var r = await fetch('/api/projects', {
            method: 'PATCH', headers: authHeaders(),
            body: JSON.stringify({ ...currentProject, slug: slug }),
          });
          var data = await r.json();
          if (r.ok) {
            if (saveStatus) { saveStatus.textContent = 'Saved!'; }
            showToast('Project saved');
            setTimeout(function () { if (saveStatus) { saveStatus.textContent = ''; } }, 2000);
          } else {
            if (saveStatus) { saveStatus.textContent = data.error || 'Error'; }
          }
        } catch (e) {
          if (saveStatus) { saveStatus.textContent = 'Network error'; }
        }
        saveBtn.disabled = false;
      });
    }
  }

  // ── Load from API ──────────────────────────────────────────────
  var token   = sessionStorage.getItem('rc_admin_token');
  var headers = token ? { 'Authorization': 'Bearer ' + token } : {};

  fetch('/api/projects?slug=' + encodeURIComponent(slug), { headers: headers })
    .then(function (r) {
      if (r.status === 404) { throw new Error('not found'); }
      return r.json();
    })
    .then(function (project) {
      var loadingEl = document.getElementById('project-loading');
      if (loadingEl) { loadingEl.remove(); }
      renderProject(project);
    })
    .catch(function (err) {
      var loadingEl = document.getElementById('project-loading');
      if (loadingEl) {
        loadingEl.innerHTML = '<p>Project not found. <a href="../work.html">Back to work</a></p>';
      }
    });

})();
</script>
<script src="../js/admin.js" defer></script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
