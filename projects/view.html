<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project — Rita Coelho</title>
  <link rel="icon" href="/favicon.ico">
  <meta name="theme-color" content="#251605">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="project-page">

<header class="nav" id="nav" role="banner">
  <a href="../index.html" class="nav__logo" aria-label="Rita Coelho — home">RC<span>.</span></a>
  <nav aria-label="Main navigation">
    <ul class="nav__links" role="list">
      <li><a href="../work.html"    class="nav__link active">Work</a></li>
      <li><a href="../journey.html" class="nav__link">Journey</a></li>
      <li><a href="../about.html"   class="nav__link">About</a></li>
      <li><a href="../contact.html" class="nav__link">Contact</a></li>
    </ul>
  </nav>
  <button class="nav__menu-btn" id="menu-btn" aria-label="Open navigation" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
</header>

<div class="mobile-menu" id="mobile-menu" role="dialog" aria-label="Navigation" aria-modal="true">
  <a href="../work.html"    class="mobile-menu__link active">Work</a>
  <a href="../journey.html" class="mobile-menu__link">Journey</a>
  <a href="../about.html"   class="mobile-menu__link">About</a>
  <a href="../contact.html" class="mobile-menu__link">Contact</a>
</div>

<main id="project-main">
  <!-- Loading state -->
  <div id="project-loading" class="container" style="padding:6rem 0;text-align:center;color:var(--muted);font-size:0.9rem;">
    Loading…
  </div>
</main>

<footer class="footer" role="contentinfo">
  <p class="footer__copy">© 2024–2026 Rita Coelho</p>
  <p class="footer__easter">
    <span class="footer__diamond" aria-hidden="true"></span>
    Made with intention
  </p>
</footer>

<script src="../js/main.js" defer></script>
<script>
(function () {
  var SVG_BACK = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M12.5 8h-9M6.5 4L3 8l3.5 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  // ── Get slug from URL ──────────────────────────────────────────
  var params = new URLSearchParams(window.location.search);
  var slug   = params.get('slug');

  if (!slug) {
    document.getElementById('project-loading').textContent = 'No project specified.';
    return;
  }

  // ── Escape HTML ────────────────────────────────────────────────
  function esc(str) {
    return String(str || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Render a content block ─────────────────────────────────────
  function renderBlock(block) {
    switch (block.type) {
      case 'heading':
        var level = block.level || 2;
        return '<h' + level + '>' + esc(block.text) + '</h' + level + '>';
      case 'paragraph':
        return '<p>' + esc(block.text) + '</p>';
      case 'image':
        return [
          '<figure style="margin:2rem 0;">',
            '<img src="' + esc(block.url) + '" alt="' + esc(block.alt || '') + '"',
                 ' style="width:100%;border-radius:12px;display:block;" loading="lazy">',
            block.caption
              ? '<figcaption style="font-size:0.78rem;color:var(--muted);margin-top:0.5rem;text-align:center;">' + esc(block.caption) + '</figcaption>'
              : '',
          '</figure>'
        ].join('');
      case 'callout':
        return '<div class="callout"><p>' + esc(block.text) + '</p></div>';
      case 'metrics':
        var items = (block.items || []).map(function (item) {
          return '<div><p class="project-meta__label">' + esc(item.label) + '</p>' +
                 '<p class="project-meta__value">' + esc(item.value) + '</p></div>';
        }).join('');
        return '<div class="project-meta" style="margin:2rem 0;">' + items + '</div>';
      case 'divider':
        return '<hr style="border:none;border-top:1px solid var(--border);margin:2.5rem 0;">';
      default:
        return '';
    }
  }

  // ── Render the full project ────────────────────────────────────
  function renderProject(p) {
    document.title = p.title + ' — Rita Coelho';

    var tags = (p.tags || []).map(function (t) {
      return '<span class="project-hero__tag">' + esc(t) + '</span>';
    }).join('');

    var metaItems = [];
    if (p.company)  { metaItems.push({ label: 'Company',  value: p.company  }); }
    if (p.period)   { metaItems.push({ label: 'Period',   value: p.period   }); }
    if (p.role)     { metaItems.push({ label: 'My role',  value: p.role     }); }
    if (p.location) { metaItems.push({ label: 'Location', value: p.location }); }

    var metaHtml = metaItems.map(function (m) {
      return '<div><p class="project-meta__label">' + esc(m.label) + '</p>' +
             '<p class="project-meta__value">' + esc(m.value) + '</p></div>';
    }).join('');

    var coverHtml = p.coverImage
      ? '<div class="project-hero__cover" style="margin:2rem 0 0;">' +
          '<img src="' + esc(p.coverImage) + '" alt="" style="width:100%;border-radius:16px;display:block;" loading="lazy">' +
        '</div>'
      : '';

    var blocksHtml = (p.content || []).map(renderBlock).join('');

    var adminEdit = '<div class="admin-only" style="margin-bottom:1rem;">' +
      '<a href="/admin/projects.html?edit=' + esc(slug) + '" class="btn btn--light" style="font-size:0.78rem;">Edit project</a>' +
    '</div>';

    var html = [
      '<section class="project-hero section container">',
        '<a href="../work.html" class="project-hero__back fade-up" aria-label="Back to all work">',
          SVG_BACK + ' All Work',
        '</a>',
        adminEdit,
        '<div class="project-hero__tags fade-up fade-up--d1">' + tags + '</div>',
        '<h1 class="project-hero__title fade-up fade-up--d2">' + esc(p.title) + '</h1>',
        p.summary
          ? '<p class="project-hero__summary fade-up fade-up--d3">' + esc(p.summary) + '</p>'
          : '',
        metaHtml ? '<div class="project-meta fade-up fade-up--d4">' + metaHtml + '</div>' : '',
        coverHtml,
      '</section>',
      '<section class="section container" aria-label="Case study">',
        '<div class="project-body">',
          blocksHtml,
        '</div>',
      '</section>',
    ].join('');

    var main = document.getElementById('project-main');
    main.innerHTML = html;

    // Trigger fade-up animations
    setTimeout(function () {
      main.querySelectorAll('.fade-up').forEach(function (el) {
        el.classList.add('visible');
      });
    }, 60);
  }

  // ── Load from API ──────────────────────────────────────────────
  var token   = sessionStorage.getItem('rc_admin_token');
  var headers = token ? { 'Authorization': 'Bearer ' + token } : {};

  fetch('/api/projects?slug=' + encodeURIComponent(slug), { headers: headers })
    .then(function (r) {
      if (r.status === 404) { throw new Error('not found'); }
      return r.json();
    })
    .then(function (project) {
      var loadingEl = document.getElementById('project-loading');
      if (loadingEl) { loadingEl.remove(); }
      renderProject(project);
    })
    .catch(function (err) {
      var loadingEl = document.getElementById('project-loading');
      if (loadingEl) {
        loadingEl.innerHTML = '<p>Project not found. <a href="../work.html">Back to work</a></p>';
      }
    });

})();
</script>
<script src="../js/admin.js" defer></script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
