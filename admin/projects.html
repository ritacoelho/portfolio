<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — Admin | Rita Coelho</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
  <style>
    /* ── Project visibility cards ── */
    .pv-list {
      display: flex;
      flex-direction: column;
      gap: 0.875rem;
    }

    .pv-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      transition: border-color 200ms ease;
    }
    .pv-card:hover { border-color: var(--mist-blue, #8ABDD8); }
    .pv-card.is-hidden { opacity: 0.5; }

    .pv-card__thumb {
      width: 64px;
      height: 46px;
      border-radius: 8px;
      object-fit: cover;
      background: var(--bg-alt);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .pv-card__thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
    }
    .pv-card__thumb--empty {
      color: var(--light);
      font-size: 1.25rem;
    }

    .pv-card__info {
      flex: 1;
      min-width: 0;
    }
    .pv-card__title {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text);
      margin: 0 0 0.2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pv-card__meta {
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .pv-card__badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      color: var(--muted);
    }
    .pv-card__badge--hidden {
      background: #fff3cd;
      border-color: #f0c040;
      color: #8a6800;
    }
    .pv-card__badge--locked {
      background: var(--burgundy-faint, #fdf0f0);
      border-color: var(--burgundy, #b73c3c);
      color: var(--burgundy, #b73c3c);
    }

    .pv-card__controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    /* Toggle rows */
    .pv-toggle-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }
    .pv-toggle-label {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--light);
    }

    /* View link */
    .pv-view-link {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.78rem;
      color: var(--brown);
      font-weight: 500;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 150ms;
      white-space: nowrap;
    }
    .pv-view-link:hover { border-color: currentColor; }

    @media (max-width: 600px) {
      .pv-card { flex-wrap: wrap; }
      .pv-card__controls { width: 100%; justify-content: flex-end; }
    }
  </style>
</head>
<body>

<header class="nav" id="nav" role="banner">
  <a href="../index.html" class="nav__logo" aria-label="Rita Coelho — home">RC<span>.</span></a>
  <nav aria-label="Main navigation">
    <ul class="nav__links" role="list">
      <li><a href="../work.html"    class="nav__link">Work</a></li>
      <li><a href="../journey.html" class="nav__link">Journey</a></li>
      <li><a href="../about.html"   class="nav__link">About</a></li>
    </ul>
  </nav>
</header>

<main>
<div class="ac-page" id="pv-page" style="display:none">

  <div style="margin-bottom:2rem;">
    <h1 class="ac-page__title">Projects</h1>
    <p class="ac-page__subtitle">Control visibility and access for each case study. To add a new project, ask Claude.</p>
  </div>

  <div id="pv-list" class="pv-list">
    <div class="ac-loading">Loading…</div>
  </div>

</div>
</main>

<script src="../js/main.js" defer></script>
<script src="../js/admin.js" defer></script>
<script>
(function () {
  'use strict';

  var SESSION_KEY = 'rc_admin_token';
  function getToken()      { return sessionStorage.getItem(SESSION_KEY); }
  function authHeaders()   { return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() }; }

  function showToast(msg, type) {
    var t = document.createElement('div');
    t.className = 'rc-toast' + (type === 'error' ? ' rc-toast--error' : '');
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(function () { t.remove(); }, 2400);
  }

  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Auth guard ─────────────────────────────────────────────────
  setTimeout(function () {
    if (!getToken()) { window.location.href = '../index.html'; return; }
    document.getElementById('pv-page').style.display = '';
    loadProjects();
  }, 60);

  window.addEventListener('rc-admin-enabled', function () {
    var p = document.getElementById('pv-page');
    if (p) { p.style.display = ''; }
  });

  // ── Load projects ──────────────────────────────────────────────
  var projects = [];

  async function loadProjects() {
    try {
      var r = await fetch('/api/projects', { headers: authHeaders() });
      projects = await r.json();
      renderList();
    } catch (e) {
      document.getElementById('pv-list').innerHTML =
        '<p style="color:var(--muted);font-size:0.88rem;">Could not load projects. Check your connection.</p>';
    }
  }

  // ── Render ─────────────────────────────────────────────────────
  function renderList() {
    var list = document.getElementById('pv-list');
    if (!projects.length) {
      list.innerHTML = '<p style="color:var(--muted);font-size:0.88rem;">No projects found. Run /api/seed to initialise.</p>';
      return;
    }

    list.innerHTML = '';

    projects.forEach(function (p) {
      var card = document.createElement('div');
      card.className = 'pv-card' + (p.isHidden ? ' is-hidden' : '');
      card.dataset.slug = p.slug;

      // Status badges
      var badges = '';
      if (p.isHidden) {
        badges += '<span class="pv-card__badge pv-card__badge--hidden">Hidden</span>';
      }
      if (p.isLocked) {
        badges += '<span class="pv-card__badge pv-card__badge--locked">NDA</span>';
      }

      // Cover thumb
      var thumbHtml = '';
      if (p.coverImage) {
        thumbHtml = '<div class="pv-card__thumb"><img src="' + esc(p.coverImage) + '" alt="" loading="lazy"></div>';
      } else {
        thumbHtml = '<div class="pv-card__thumb pv-card__thumb--empty">◆</div>';
      }

      // Page URL for view link
      var pageUrl = 'projects/' + p.slug + '.html';

      card.innerHTML = [
        thumbHtml,
        '<div class="pv-card__info">',
          '<p class="pv-card__title">' + esc(p.title) + '</p>',
          '<div class="pv-card__meta">',
            '<span>' + esc((p.tags || []).join(' · ')) + '</span>',
            badges ? '<span>·</span>' + badges : '',
          '</div>',
        '</div>',
        '<div class="pv-card__controls">',
          /* View link */
          '<a href="../' + esc(pageUrl) + '" class="pv-view-link" target="_blank" rel="noopener" title="Open case study">',
            '<svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">',
              '<path d="M5 2H2a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V8M8 1h4m0 0v4m0-4L5.5 7.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>',
            '</svg>',
            'View',
          '</a>',
          /* Hide / Show toggle */
          '<div class="pv-toggle-row">',
            '<label class="rc-toggle-switch" for="hide-' + esc(p.slug) + '" title="' + (p.isHidden ? 'Show to public' : 'Hide from public') + '">',
              '<input type="checkbox" id="hide-' + esc(p.slug) + '" data-action="toggle-hide" data-slug="' + esc(p.slug) + '"' + (p.isHidden ? ' checked' : '') + '>',
              '<span class="rc-toggle-track"></span>',
            '</label>',
            '<span class="pv-toggle-label">Hidden</span>',
          '</div>',
          /* Lock / Unlock toggle */
          '<div class="pv-toggle-row">',
            '<label class="rc-toggle-switch" for="lock-' + esc(p.slug) + '" title="' + (p.isLocked ? 'Remove access code gate' : 'Require access code') + '">',
              '<input type="checkbox" id="lock-' + esc(p.slug) + '" data-action="toggle-lock" data-slug="' + esc(p.slug) + '"' + (p.isLocked ? ' checked' : '') + '>',
              '<span class="rc-toggle-track"></span>',
            '</label>',
            '<span class="pv-toggle-label">NDA gate</span>',
          '</div>',
        '</div>',
      ].join('');

      list.appendChild(card);
    });

    // Attach toggle listeners
    list.querySelectorAll('[data-action]').forEach(function (input) {
      input.addEventListener('change', function () {
        var action = input.dataset.action;
        var slug   = input.dataset.slug;
        if (action === 'toggle-hide') { patchProject(slug, { isHidden: input.checked }); }
        if (action === 'toggle-lock') { patchProject(slug, { isLocked: input.checked }); }
      });
    });
  }

  // ── PATCH helper ───────────────────────────────────────────────
  async function patchProject(slug, updates) {
    var card = document.querySelector('[data-slug="' + slug + '"]');
    try {
      var r    = await fetch('/api/projects', {
        method:  'PATCH',
        headers: authHeaders(),
        body:    JSON.stringify({ slug, ...updates }),
      });
      var data = await r.json();
      if (!r.ok) { throw new Error(data.error || 'Error'); }

      // Update card state
      if (typeof updates.isHidden !== 'undefined') {
        card.classList.toggle('is-hidden', data.isHidden);
        var badge = card.querySelector('.pv-card__badge--hidden');
        if (data.isHidden && !badge) {
          var metaEl = card.querySelector('.pv-card__meta');
          var b = document.createElement('span');
          b.className = 'pv-card__badge pv-card__badge--hidden';
          b.textContent = 'Hidden';
          metaEl.appendChild(b);
        } else if (!data.isHidden && badge) {
          badge.remove();
        }
        showToast(data.isHidden ? '"' + data.title + '" hidden from public.' : '"' + data.title + '" visible to public.');
      }
      if (typeof updates.isLocked !== 'undefined') {
        var lockBadge = card.querySelector('.pv-card__badge--locked');
        if (data.isLocked && !lockBadge) {
          var metaEl = card.querySelector('.pv-card__meta');
          var b = document.createElement('span');
          b.className = 'pv-card__badge pv-card__badge--locked';
          b.textContent = 'NDA';
          metaEl.appendChild(b);
        } else if (!data.isLocked && lockBadge) {
          lockBadge.remove();
        }
        showToast(data.isLocked ? 'Access code gate enabled.' : 'Access code gate removed.');
      }

    } catch (err) {
      showToast('Could not save — ' + err.message, 'error');
      // Revert the toggle
      loadProjects();
    }
  }

})();
</script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
