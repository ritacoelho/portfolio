<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Codes — Admin | Rita Coelho</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

<header class="nav" id="nav" role="banner">
  <a href="../index.html" class="nav__logo" aria-label="Rita Coelho — home">RC<span>.</span></a>
  <nav aria-label="Main navigation">
    <ul class="nav__links" role="list">
      <li><a href="../work.html"    class="nav__link">Work</a></li>
      <li><a href="../journey.html" class="nav__link">Journey</a></li>
      <li><a href="../about.html"   class="nav__link">About</a></li>
      <li><a href="../contact.html" class="nav__link">Contact</a></li>
    </ul>
  </nav>
</header>

<!-- Redirect to home if not admin (handled by JS below) -->
<div id="ac-auth-guard" style="display:none"></div>

<main>
<div class="ac-page" id="ac-page" style="display:none">

  <h1 class="ac-page__title">Access Codes</h1>
  <p class="ac-page__subtitle">Manage access codes for protected content on the portfolio.</p>

  <!-- ── Create new code ── -->
  <div class="ac-create">
    <p class="ac-create__title">Generate new code</p>
    <form class="ac-form" id="ac-create-form" autocomplete="off">
      <div class="ac-form__field">
        <label class="ac-form__label" for="ac-recipient">Recipient *</label>
        <input class="ac-form__input" type="text" id="ac-recipient"
          placeholder="e.g. Jane Smith / Google" required>
      </div>
      <div class="ac-form__field">
        <label class="ac-form__label" for="ac-expiry">Expiry date (optional)</label>
        <input class="ac-form__input" type="date" id="ac-expiry">
      </div>
      <div class="ac-form__field ac-form__field--full">
        <label class="ac-form__label" for="ac-desc">Description (optional)</label>
        <input class="ac-form__input" type="text" id="ac-desc"
          placeholder="e.g. Recruiter at Google — applied via LinkedIn">
      </div>
      <div class="ac-form__submit">
        <button class="ac-btn ac-btn--primary" type="submit" id="ac-submit-btn">Generate code</button>
        <span class="ac-create__status" id="ac-create-status"></span>
      </div>
    </form>

    <!-- New code display (shown after creation) -->
    <div id="ac-new-code-wrap" style="display:none; margin-top:1rem;">
      <p style="font-size:0.78rem;color:#555;margin:0 0 0.5rem;">New code (click to copy):</p>
      <button class="ac-new-code" id="ac-new-code-display" type="button">
        <span id="ac-new-code-val">—</span>
        <span class="ac-new-code__copy" id="ac-copy-hint">Click to copy</span>
      </button>
    </div>
  </div>

  <!-- ── Codes table ── -->
  <div class="ac-table-wrap">
    <table class="ac-table" id="ac-table">
      <thead>
        <tr>
          <th>Code</th>
          <th>Recipient</th>
          <th>Description</th>
          <th>Status</th>
          <th>Uses</th>
          <th>Last used</th>
          <th>Expires</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="ac-table-body">
        <tr><td colspan="8" class="ac-loading">Loading…</td></tr>
      </tbody>
    </table>
  </div>

</div>
</main>

<script src="../js/main.js" defer></script>
<script src="../js/admin.js" defer></script>
<script>
(function () {
  'use strict';

  var SESSION_KEY = 'rc_admin_token';

  function getToken() { return sessionStorage.getItem(SESSION_KEY); }

  // ── Auth guard: redirect if not admin ───────────────────────────
  function checkAuth() {
    var token = getToken();
    if (!token) {
      window.location.href = '../index.html';
      return false;
    }
    return true;
  }

  // ── Helpers ──────────────────────────────────────────────────────
  function authHeaders() {
    return {
      'Content-Type':  'application/json',
      'Authorization': 'Bearer ' + getToken()
    };
  }

  function formatDate(iso) {
    if (!iso) { return '—'; }
    try {
      return new Date(iso).toLocaleDateString('en-GB', {
        day:   'numeric',
        month: 'short',
        year:  'numeric'
      });
    } catch (e) { return iso; }
  }

  function statusBadge(entry) {
    var now = new Date();
    if (!entry.isActive) {
      return '<span class="ac-status-badge ac-status-badge--inactive">Inactive</span>';
    }
    if (entry.expiryDate && new Date(entry.expiryDate) < now) {
      return '<span class="ac-status-badge ac-status-badge--expired">Expired</span>';
    }
    return '<span class="ac-status-badge ac-status-badge--active">Active</span>';
  }

  function showToast(msg) {
    var t = document.createElement('div');
    t.className   = 'rc-toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(function () { t.remove(); }, 2200);
  }

  // ── Copy to clipboard ────────────────────────────────────────────
  function copyText(text) {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).catch(function () {});
    } else {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity  = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
    }
  }

  // ── Load codes ───────────────────────────────────────────────────
  async function loadCodes() {
    var tbody = document.getElementById('ac-table-body');
    if (!tbody) { return; }
    tbody.innerHTML = '<tr><td colspan="8" class="ac-loading">Loading…</td></tr>';

    try {
      var r    = await fetch('/api/access-codes', { headers: authHeaders() });
      if (r.status === 401) { window.location.href = '../index.html'; return; }
      var data = await r.json();
      renderTable(data);
    } catch (e) {
      tbody.innerHTML = '<tr><td colspan="8" class="ac-empty">Failed to load codes. Check your connection.</td></tr>';
    }
  }

  function renderTable(entries) {
    var tbody = document.getElementById('ac-table-body');
    if (!entries || entries.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" class="ac-empty">No codes yet. Generate one above.</td></tr>';
      return;
    }

    tbody.innerHTML = '';
    entries.forEach(function (entry) {
      var tr = document.createElement('tr');
      tr.dataset.code = entry.code;

      var SVG_COPY       = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="5" y="5" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M9 5V3.5A1.5 1.5 0 0 0 7.5 2h-4A1.5 1.5 0 0 0 2 3.5v4A1.5 1.5 0 0 0 3.5 9H5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>';
      var SVG_ACTIVATE   = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2.5 7.5L5.5 10.5L11.5 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      var SVG_DEACTIVATE = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3.5 3.5l7 7M10.5 3.5l-7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>';
      var SVG_DELETE     = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1.5 3.5h11M4.5 3.5V2.5A.5.5 0 0 1 5 2h4a.5.5 0 0 1 .5.5V3.5M5.5 6.5v3M8.5 6.5v3M2.5 3.5l.8 8.1A.5.5 0 0 0 3.8 12h6.4a.5.5 0 0 0 .5-.4l.8-8.1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>';

      tr.innerHTML = [
        '<td>',
          '<button class="ac-code-pill" data-copy="' + entry.code + '" data-tooltip="Copy code" title="Click to copy">',
            entry.code,
          '</button>',
        '</td>',
        '<td>' + escHtml(entry.recipient || '—') + '</td>',
        '<td>',
          '<span class="ac-desc-editable" contenteditable="true"',
            ' data-code="' + entry.code + '" data-field="description"',
            ' title="Click to edit description">',
            escHtml(entry.description || ''),
          '</span>',
        '</td>',
        '<td>' + statusBadge(entry) + '</td>',
        '<td>' + (entry.usageCount || 0) + '</td>',
        '<td>' + formatDate(entry.lastUsedAt) + '</td>',
        '<td>' + formatDate(entry.expiryDate) + '</td>',
        '<td>',
          '<div class="ac-table__actions">',
            '<button class="ac-icon-btn" data-action="copy-code" data-code="' + entry.code + '"',
              ' data-tooltip="Copy code" aria-label="Copy code">' + SVG_COPY + '</button>',
            entry.isActive
              ? '<button class="ac-icon-btn ac-icon-btn--active" data-action="deactivate" data-code="' + entry.code + '"',
                ' data-tooltip="Deactivate" aria-label="Deactivate">' + SVG_DEACTIVATE + '</button>'
              : '<button class="ac-icon-btn" data-action="activate" data-code="' + entry.code + '"',
                ' data-tooltip="Activate" aria-label="Activate">' + SVG_ACTIVATE + '</button>',
            '<button class="ac-icon-btn ac-icon-btn--danger" data-action="delete" data-code="' + entry.code + '"',
              ' data-tooltip="Delete" aria-label="Delete">' + SVG_DELETE + '</button>',
          '</div>',
        '</td>'
      ].join('');

      tbody.appendChild(tr);
    });

    // Copy code pills
    tbody.querySelectorAll('[data-copy]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        copyText(btn.dataset.copy);
        showToast('Copied ' + btn.dataset.copy);
      });
    });

    // Inline description save on blur
    tbody.querySelectorAll('.ac-desc-editable').forEach(function (el) {
      el.addEventListener('blur', async function () {
        var code = el.dataset.code;
        var desc = el.textContent.trim();
        try {
          await fetch('/api/access-codes', {
            method:  'PATCH',
            headers: authHeaders(),
            body:    JSON.stringify({ code: code, description: desc })
          });
        } catch (e) {}
      });
      // Prevent newlines in description
      el.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
      });
    });

    // Action buttons
    tbody.querySelectorAll('[data-action]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var action = btn.dataset.action;
        var code   = btn.dataset.code;
        if (action === 'copy-code')  { copyText(code); showToast('Copied ' + code); }
        if (action === 'deactivate') { toggleActive(code, false); }
        if (action === 'activate')   { toggleActive(code, true); }
        if (action === 'delete')     { deleteCode(code); }
      });
    });
  }

  async function toggleActive(code, isActive) {
    try {
      await fetch('/api/access-codes', {
        method:  'PATCH',
        headers: authHeaders(),
        body:    JSON.stringify({ code: code, isActive: isActive })
      });
      showToast(isActive ? 'Code activated' : 'Code deactivated');
      loadCodes();
    } catch (e) {
      showToast('Error updating code');
    }
  }

  async function deleteCode(code) {
    if (!confirm('Delete code ' + code + '? This cannot be undone.')) { return; }
    try {
      await fetch('/api/access-codes', {
        method:  'DELETE',
        headers: authHeaders(),
        body:    JSON.stringify({ code: code })
      });
      showToast('Code deleted');
      loadCodes();
    } catch (e) {
      showToast('Error deleting code');
    }
  }

  // ── Create form ──────────────────────────────────────────────────
  var createForm   = document.getElementById('ac-create-form');
  var submitBtn    = document.getElementById('ac-submit-btn');
  var statusEl     = document.getElementById('ac-create-status');
  var newCodeWrap  = document.getElementById('ac-new-code-wrap');
  var newCodeVal   = document.getElementById('ac-new-code-val');
  var newCodeBtn   = document.getElementById('ac-new-code-display');
  var copyHint     = document.getElementById('ac-copy-hint');

  if (newCodeBtn) {
    newCodeBtn.addEventListener('click', function () {
      copyText(newCodeVal.textContent);
      copyHint.textContent = 'Copied!';
      setTimeout(function () { copyHint.textContent = 'Click to copy'; }, 1800);
    });
  }

  if (createForm) {
    createForm.addEventListener('submit', async function (e) {
      e.preventDefault();
      var recipient = document.getElementById('ac-recipient').value.trim();
      var expiry    = document.getElementById('ac-expiry').value || null;
      var desc      = document.getElementById('ac-desc').value.trim();

      submitBtn.disabled    = true;
      submitBtn.textContent = 'Generating…';
      statusEl.textContent  = '';
      statusEl.className    = 'ac-create__status';
      newCodeWrap.style.display = 'none';

      try {
        var r    = await fetch('/api/access-codes', {
          method:  'POST',
          headers: authHeaders(),
          body:    JSON.stringify({ recipient: recipient, description: desc, expiryDate: expiry })
        });
        var data = await r.json();

        if (r.ok && data.code) {
          statusEl.textContent  = 'Code created successfully';
          statusEl.className    = 'ac-create__status is-success';
          newCodeVal.textContent = data.code;
          newCodeWrap.style.display = 'block';
          copyHint.textContent  = 'Click to copy';
          createForm.reset();
          loadCodes();
        } else {
          statusEl.textContent = data.error || 'Failed to create code';
          statusEl.className   = 'ac-create__status is-error';
        }
      } catch (err) {
        statusEl.textContent = 'Error — check connection';
        statusEl.className   = 'ac-create__status is-error';
      }

      submitBtn.disabled    = false;
      submitBtn.textContent = 'Generate code';
    });
  }

  // ── Init ─────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', function () {
    // Wait a tick for admin.js to run its verify
    setTimeout(function () {
      if (!checkAuth()) { return; }
      document.getElementById('ac-page').style.display = '';
      loadCodes();
    }, 50);
  });

  // Also respond to admin enable event (in case verify fires after DOMContentLoaded)
  window.addEventListener('rc-admin-enabled', function () {
    var page = document.getElementById('ac-page');
    if (page) { page.style.display = ''; }
    loadCodes();
  });

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

})();
</script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
