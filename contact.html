  <style>
    /* Contact page — full viewport, pill CTAs */
    .contact-full {
      margin-top: 64px;              /* push below fixed nav */
      min-height: calc(100svh - 64px);
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* Left panel — identity + CTAs */
    .contact-panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(2.5rem, 5vw, 4.5rem) var(--gutter) clamp(2rem, 4vw, 4rem);
      background: var(--bg);
      border-right: 1.5px solid var(--border);
    }
    .contact-panel__back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-display);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 3rem;
      transition: color 200ms ease, gap 200ms ease;
      align-self: flex-start;
    }
    .contact-panel__back svg { transition: transform 200ms ease; }
    .contact-panel__back:hover { color: var(--brown); gap: 0.75rem; }
    .contact-panel__back:hover svg { transform: translateX(-3px); }

    .contact-panel__heading {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.0;
      color: var(--text);
      margin-bottom: 1.25rem;
    }
    .contact-panel__sub {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.75;
      max-width: 380px;
      margin-bottom: 2.75rem;
    }

    /* Pill CTA buttons */
    .contact-ctas {
      display: flex;
      flex-direction: column;
      gap: 0.875rem;
      max-width: 320px;
    }
    .contact-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      padding: 1rem 2rem;
      border-radius: 999px;
      font-family: var(--font-display);
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      transition: background 220ms ease, transform 220ms var(--ease-spring), color 200ms ease;
    }
    .contact-cta--primary {
      background: var(--brown);
      color: var(--off-white);
      border: 2px solid var(--brown);
    }
    .contact-cta--primary:hover {
      background: var(--brown-dark);
      border-color: var(--brown-dark);
      transform: translateY(-2px);
    }
    .contact-cta--secondary {
      background: transparent;
      color: var(--text);
      border: 2px solid var(--border);
    }
    .contact-cta--secondary:hover {
      background: var(--mist-blue);
      border-color: var(--mist-grey);
      transform: translateY(-2px);
    }

    /* Divider below CTAs */
    .contact-panel__divider {
      width: 40px;
      height: 2px;
      background: var(--burgundy);
      margin: 2.5rem 0;
    }

    /* GitHub link — tertiary, text only */
    .contact-panel__github {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--font-display);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 200ms ease;
    }
    .contact-panel__github:hover { color: var(--brown); }

    /* Right panel — map */
    .contact-map-panel {
      position: relative;
      overflow: hidden;
      background: var(--mist-grey);
    }
    .contact-map-panel iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      filter: saturate(0.6) contrast(0.9);
    }
    /* Location badge floating over map */
    .contact-map-badge {
      position: absolute;
      bottom: 1.75rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 999px;
      padding: 0.5rem 1.1rem;
      font-family: var(--font-display);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--text);
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      z-index: 10;
    }

    /* Responsive */
    @media (max-width: 800px) {
      .contact-full {
        grid-template-columns: 1fr;
        grid-template-rows: auto 50svh;
      }
      .contact-panel {
        border-right: none;
        border-bottom: 1.5px solid var(--border);
        padding: 3rem var(--gutter) 3rem;
      }
      .contact-map-panel {
        min-height: 280px;
      }
    }
  </style>
</head>
